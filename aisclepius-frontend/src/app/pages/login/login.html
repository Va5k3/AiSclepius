<div class="min-h-screen flex items-center justify-center bg-gray-50 p-6">
  <div class="w-full max-w-md bg-white rounded-3xl p-8 shadow-md border border-gray-100 space-y-6">
    
    <div class="text-center">
      <h2 class="text-2xl font-bold text-gray-900">AiSclepius - Prijava</h2>
    </div>

    <form (submit)="onLogin()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email adresa</label>
        <input type="email" [(ngModel)]="credentials.email" name="email" required class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition-all">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Lozinka</label>
        <input type="password" [(ngModel)]="credentials.password" name="password" required class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition-all">
      </div>

      <div *ngIf="errorMessage" class="text-xs text-red-500 font-semibold mt-1">
        {{ errorMessage }}
      </div>

      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm rounded-xl py-3.5 transition-all shadow-md active:scale-[0.99]">
        Prijavi se
      </button>
    </form>

  </div>
</div>
