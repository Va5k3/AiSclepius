<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-teal-950 p-6 relative overflow-hidden">
  <div class="absolute -left-10 -top-10 w-72 h-72 bg-teal-500/10 rounded-full blur-3xl animate-pulse"></div>
  <div class="absolute -right-20 -bottom-20 w-72 h-72 bg-blue-500/10 rounded-full blur-3xl"></div>

  <div class="w-full max-w-md bg-white rounded-3xl p-8 shadow-2xl shadow-slate-950/40 border border-slate-200/80 space-y-6 relative z-10">
    
    <div class="text-center">
      <h2 class="text-2xl font-black text-slate-800 tracking-tight">AiSclepius - Registracija</h2>
    </div>

    <form (submit)="onRegister()" class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">Ime i Prezime</label>
        <input type="text" [(ngModel)]="registerData.name" name="name" required 
               class="w-full border border-slate-200 bg-slate-50/50 rounded-xl px-4 py-3 text-sm outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 text-slate-800 font-medium transition-all"
               placeholder="Marko Marković">
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">Email adresa</label>
        <input type="email" [(ngModel)]="registerData.email" name="email" required 
               class="w-full border border-slate-200 bg-slate-50/50 rounded-xl px-4 py-3 text-sm outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 text-slate-800 font-medium transition-all"
               placeholder="ime@primer.com">
      </div>

      <div>
      <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">
        Vi ste :
      </label>

      <select
        [(ngModel)]="registerData.role"
        name="role"
        class="w-full border border-slate-200 bg-slate-50/50 rounded-xl px-4 py-3 text-sm outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 text-slate-800 font-medium transition-all">

        <option value="patient">Pacijent</option>
        <option value="doctor">Doktor</option>
      </select>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">Lozinka</label>
        <input type="password" [(ngModel)]="registerData.password" name="password" required 
               class="w-full border border-slate-200 bg-slate-50/50 rounded-xl px-4 py-3 text-sm outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 text-slate-800 font-medium transition-all"
               placeholder="••••••••">
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5">Ponovite lozinku</label>
        <input type="password" [(ngModel)]="registerData.password2" name="password2" required 
               class="w-full border border-slate-200 bg-slate-50/50 rounded-xl px-4 py-3 text-sm outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 text-slate-800 font-medium transition-all"
               placeholder="••••••••">
      </div>

      <div *ngIf="errorMessage" class="text-xs text-red-500 font-semibold bg-red-50 border border-red-200 rounded-xl p-3 mt-1">
        ⚠️ {{ errorMessage }}
      </div>

      <button type="submit" 
              class="w-full bg-slate-900 hover:bg-teal-950 text-white font-bold text-xs uppercase tracking-wider rounded-xl py-4 transition-all duration-300 shadow-md shadow-slate-900/10 active:scale-[0.99] border border-slate-800">
        Registruj se
      </button>

      <div class="text-center pt-2 border-t border-slate-100">
        <p class="text-xs text-slate-500 font-medium">
          Već imate nalog?
          <a routerLink="/login" class="text-teal-600 hover:text-teal-700 font-bold ml-1 hover:underline transition-all">
            Prijavite se ovde
          </a>
        </p>
      </div>
    </form>

  </div>
</div>
