services:
  ml-service:
    build:
      context: ./ml-service
    restart: unless-stopped
    expose:
      - "8000"

  backend:
    build:
      context: ./backend-laravel
    restart: unless-stopped
    env_file:
      - ./backend-laravel/.env.aws
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      ml-service:
        condition: service_started
    expose:
      - "80"

  frontend:
    build:
      context: ./aisclepius-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"